<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Commissions">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>StrikeWorks Commissions</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;
  --text:#e0e0e0;--text-dim:#888;--accent:#17C6BD;--accent-dim:rgba(23,198,189,.15);
  --gold:#FFD700;--red:#EF4444;--green:#10B981;--purple:#8B5CF6;
  --radius:12px;--font:'Inter',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input{font-family:var(--font);outline:none}

/* ── Spinner ── */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.spinner-lg{width:40px;height:40px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Skeleton Loading ── */
@keyframes shimmer{
  0%{background-position:-400px 0}
  100%{background-position:400px 0}
}
.skeleton{background:var(--surface2);background-image:linear-gradient(90deg,var(--surface2) 0%,#252525 50%,var(--surface2) 100%);background-size:400px 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius)}
.skeleton-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.skeleton-stat{height:72px;border-radius:var(--radius)}
.skeleton-card{height:80px;border-radius:var(--radius);margin-bottom:8px}
@media(min-width:481px){
  .skeleton-stats{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
}
#loading-skeleton{display:none}

/* ── Login ── */
#login-view{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;opacity:1;transition:opacity .2s ease}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:24px;font-weight:700;color:#fff}
.login-logo p{font-size:13px;color:var(--text-dim);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-group input[type="email"],.form-group input[type="password"]{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer}
.remember-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.remember-row label{font-size:13px;color:var(--text-dim);cursor:pointer;user-select:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{width:100%;background:var(--accent);color:#000;padding:12px}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:20px}

/* ── Dashboard ── */
#dashboard-view{display:none;min-height:100vh;opacity:1;transition:opacity .2s ease}
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.dash-header h2{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.quarter-nav{display:flex;align-items:center;gap:4px}
.quarter-nav button{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;font-weight:600}
.quarter-nav button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.quarter-nav button:hover:not(.active){border-color:var(--text-dim)}
.year-nav{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff}
.year-nav button{padding:4px 8px;background:transparent;color:var(--text-dim);font-size:16px;border-radius:4px}
.year-nav button:hover{color:#fff}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;font-weight:600}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

.dash-body{padding:24px;max-width:1400px;margin:0 auto;position:relative}

/* ── Pull to Refresh ── */
.ptr-indicator{display:none;align-items:center;justify-content:center;padding:12px;margin-bottom:8px}
.ptr-indicator.show{display:flex}
.ptr-indicator .spinner{width:24px;height:24px}

/* ── Offline Banner ── */
.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(245,158,11,.9);color:#000;text-align:center;padding:8px 16px;font-size:13px;font-weight:600;z-index:1000;transform:translateY(-100%);transition:transform .3s ease}
.offline-banner.show{transform:translateY(0)}

/* ── Stats Row ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px}
.stat-card .label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:22px;font-weight:700;color:#fff}
.stat-card .value.accent{color:var(--accent)}
.stat-card .value.gold{color:var(--gold)}
.stat-card .delta{font-size:11px;font-weight:600;margin-top:2px}
.stat-card .delta.positive{color:var(--green)}
.stat-card .delta.negative{color:var(--red)}

/* ── Content Transitions ── */
#dash-content{transition:opacity .15s ease}

/* ── Section ── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px}
.section-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px}

/* ── Waterfall Chart ── */
.waterfall-chart{position:relative;overflow-x:auto}
.wf-row{display:flex;align-items:center;margin-bottom:8px;min-height:32px}
.wf-label{width:180px;min-width:180px;font-size:12px;color:var(--text-dim);padding-right:12px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wf-bar-wrap{flex:1;position:relative;height:28px;background:var(--surface2);border-radius:4px;overflow:hidden}
.wf-bar{height:100%;display:flex;transition:width .4s ease}
.wf-bar-base{background:var(--accent);height:100%}
.wf-bar-accel{background:var(--gold);height:100%}
.wf-bar-project{background:var(--purple);height:100%}
.wf-amount{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.wf-quota-line{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--gold);z-index:5}
.wf-quota-label{position:absolute;top:-18px;font-size:10px;color:var(--gold);font-weight:600;white-space:nowrap;transform:translateX(-50%)}

/* ── Tables ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted-asc::after{content:' \u25B2';font-size:9px}
thead th.sorted-desc::after{content:' \u25BC';font-size:9px}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:hover{background:var(--surface2)}
.sub-row td{padding-left:40px;font-size:12px;color:var(--text-dim);border-bottom:1px solid rgba(42,42,42,.5)}
.total-row td{font-weight:700;border-top:2px solid var(--border);color:#fff}
.rate-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.rate-base{background:rgba(23,198,189,.15);color:var(--accent)}
.rate-accel{background:rgba(255,215,0,.15);color:var(--gold)}
.rate-split{background:linear-gradient(90deg,rgba(23,198,189,.15),rgba(255,215,0,.15));color:var(--text)}
.rate-project{background:rgba(139,92,246,.15);color:var(--purple)}

/* ── Filter Tabs ── */
.filter-tabs{display:flex;gap:4px;margin-bottom:16px}
.filter-tabs button{padding:6px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;font-weight:600}
.filter-tabs button.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── Company Chart ── */
.company-bar-wrap{margin-bottom:16px}
.cb-row{display:flex;align-items:center;margin-bottom:6px}
.cb-label{width:140px;min-width:140px;font-size:12px;color:var(--text-dim);text-align:right;padding-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-bar-bg{flex:1;height:22px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex}
.cb-bar-seg{height:100%;transition:width .3s ease}
.cb-amount{font-size:11px;color:var(--text-dim);padding-left:8px;white-space:nowrap;min-width:60px}

/* ── Responsive ── */
@media(max-width:768px){
  .dash-header{padding:12px 16px}
  .dash-body{padding:16px}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px}
  .wf-label,.cb-label{width:80px;min-width:80px;font-size:10px}
  .stat-card .value{font-size:18px}
  .section{padding:16px;margin-bottom:16px}
  .section-title{font-size:14px;margin-bottom:12px}
  table{font-size:12px}
  thead th{padding:6px 8px;font-size:10px}
  tbody td{padding:6px 8px}
  .sub-row td{padding-left:24px;font-size:11px}
  .rate-badge{font-size:10px;padding:2px 6px}
  .filter-tabs button{padding:5px 12px;font-size:11px}
}
@media(max-width:480px){
  .dash-body{padding:12px}
  .stats-row{grid-template-columns:1fr 1fr;gap:6px}
  .stat-card{padding:10px 12px;border-radius:8px}
  .stat-card .label{font-size:9px;letter-spacing:.3px}
  .stat-card .value{font-size:15px}
  #welcome-msg{font-size:18px !important}
  .quarter-nav button{padding:5px 10px;font-size:11px}
  .year-nav{font-size:13px}
  .section{padding:12px;border-radius:8px}
  /* Hide tables on mobile — JS renders cards instead */
  .table-wrap{margin:0}
  /* Mobile cards */
  .deal-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;transition:border-color .2s}
  .deal-card .dc-header{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
  .deal-card .dc-header-left{flex:1;min-width:0}
  .deal-card .dc-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .deal-card .dc-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:8px;line-height:1.3}
  .deal-card .dc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .deal-card .dc-label{color:var(--text-dim)}
  .deal-card .dc-value{color:var(--text);font-weight:500;text-align:right}
  .deal-card .dc-value.accent{color:var(--accent)}
  .deal-card .dc-value.gold{color:var(--gold)}
  .deal-card .dc-split{border-top:1px solid var(--border);margin-top:6px;padding-top:6px}
  .deal-card-total{background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:12px;margin-top:4px}
  /* Expandable deal cards */
  .deal-card .dc-expand-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .deal-card.expanded .dc-expand-body{max-height:300px}
  /* Hero commission card */
  .hero-card{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:20px;margin-bottom:16px;text-align:center;transition:border-color .3s}
  .hero-card .hero-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
  .hero-card .hero-value{font-size:36px;font-weight:700;color:var(--accent);margin:8px 0}
  .hero-card .hero-delta{font-size:12px;font-weight:600;margin-bottom:4px}
  .hero-card .hero-delta.positive{color:var(--green)}
  .hero-card .hero-delta.negative{color:var(--red)}
  .hero-card .hero-bar{height:8px;background:var(--surface2);border-radius:4px;margin:12px 0 8px;overflow:hidden}
  .hero-card .hero-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease,background .3s ease,box-shadow .3s ease}
  .hero-card .hero-bar-fill.gold-bar{background:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.4)}
  .hero-card .hero-sub{font-size:12px;color:var(--text-dim)}
  /* Hide stat cards on mobile */
  .stat-card.mobile-hide{display:none}
  /* Hide waterfall on mobile */
  #waterfall-section{display:none}
  /* Collapsible sections */
  .section-title.collapsible{cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .section-title.collapsible.collapsed{margin-bottom:0}
  .section-title.collapsible::after{content:'\25BC';font-size:10px;color:var(--text-dim);transition:transform .2s}
  .section-title.collapsed::after{transform:rotate(-90deg)}
  .section-body{margin:0;padding:0}
  .section-body.collapsed{display:none}
  /* Waterfall chart */
  .wf-label,.cb-label{width:70px;min-width:70px;font-size:9px}
  .wf-amount{font-size:10px}
  .wf-bar-wrap{height:24px}
  /* Company chart */
  .cb-bar-bg{height:18px}
  .cb-amount{font-size:10px;min-width:50px}
  /* Login */
  .login-card{padding:32px 20px}
  .login-logo img{height:32px !important}
  /* Skeleton responsive */
  .skeleton-stats{grid-template-columns:1fr 1fr;gap:6px}
}
/* ── Install Banner ── */
#install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 24px;display:none;align-items:center;gap:14px;z-index:900;animation:slideUp .3s ease forwards}
#install-banner.show{display:flex}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#install-banner .ib-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0}
#install-banner .ib-text{flex:1}
#install-banner .ib-title{font-size:14px;font-weight:600;color:#fff}
#install-banner .ib-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
#install-banner .ib-install{padding:8px 20px;background:var(--accent);color:#000;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap}
#install-banner .ib-install:hover{opacity:.9}
#install-banner .ib-dismiss{padding:8px;background:transparent;color:var(--text-dim);font-size:20px;line-height:1}
#install-banner .ib-dismiss:hover{color:#fff}
/* ── Logout Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:950;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:320px;width:90%;text-align:center}
.modal-box h3{font-size:16px;font-weight:700;color:#fff;margin-bottom:8px}
.modal-box p{font-size:13px;color:var(--text-dim);margin-bottom:20px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--font)}
.modal-btn-cancel{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.modal-btn-cancel:hover{border-color:var(--text-dim)}
.modal-btn-confirm{background:var(--red);color:#fff;border:none}
.modal-btn-confirm:hover{opacity:.9}
</style>
</head>
<body>

<!-- ── OFFLINE BANNER ── -->
<div class="offline-banner" id="offline-banner">You're offline — showing cached data</div>

<!-- ── LOGIN VIEW ── -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo">
      <img src="icons/logo.png" alt="StrikeWorks" style="height:40px;margin-bottom:12px">
      <p>Commission Portal</p>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@strikeworks.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="remember-row">
      <input type="checkbox" id="remember-me" checked>
      <label for="remember-me">Remember me</label>
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── DASHBOARD VIEW ── -->
<div id="dashboard-view">
  <div class="dash-header">
    <img src="icons/logo.png" alt="StrikeWorks" style="height:24px">
    <button class="btn-logout" onclick="document.getElementById('logout-modal').classList.add('show')">Logout</button>
  </div>
  <div class="dash-body" id="dash-body">
    <div class="ptr-indicator" id="ptr-indicator"><div class="spinner"></div></div>
    <h2 id="welcome-msg" style="font-size:22px;font-weight:700;color:#fff;margin-bottom:16px">Welcome</h2>
    <div id="quarter-controls" style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <div class="quarter-nav" id="quarter-nav"></div>
      <div class="year-nav">
        <button onclick="changeYear(-1)">&lsaquo;</button>
        <span id="year-display"></span>
        <button onclick="changeYear(1)">&rsaquo;</button>
      </div>
    </div>
    <div id="loading-skeleton" style="display:none">
      <div class="skeleton-stats">
        <div class="skeleton skeleton-stat"></div>
        <div class="skeleton skeleton-stat"></div>
        <div class="skeleton skeleton-stat"></div>
        <div class="skeleton skeleton-stat"></div>
      </div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div id="dash-content" style="display:none">
      <div id="hero-card-wrap"></div>
      <div class="stats-row" id="stats-row"></div>
      <div class="section" id="waterfall-section">
        <div class="section-title">Commission Waterfall</div>
        <div class="waterfall-chart" id="waterfall-chart"></div>
      </div>
      <div class="section" id="commission-table-section">
        <div class="section-title">Commission Breakdown</div>
        <div class="table-wrap" id="commission-table-wrap"></div>
      </div>
      <div class="section" id="deal-table-section">
        <div class="section-title">Deals</div>
        <div class="filter-tabs" id="deal-filter-tabs"></div>
        <div class="table-wrap" id="deal-table-wrap"></div>
      </div>
      <div class="section" id="company-section">
        <div class="section-title">Company Breakdown</div>
        <div class="company-bar-wrap" id="company-chart"></div>
        <div class="table-wrap" id="company-table-wrap"></div>
      </div>
    </div>
  </div>
</div>


<script>
/* ================================================================
   CONFIG & HELPERS
   ================================================================ */
var API_BASE = 'https://api.triggr-app.com';
var WF_AUTH = '60f68696-9708-4ea7-89c9-5e3c469c8845';
var WF_DATA = 'bf1b08a9-73ed-413e-9cd9-02c0cdf30084';

var QUOTA = 15000;
var BASE_RATE = 1;
var ACCEL_RATE = 1.5;

var COMPANY_COLORS = ['#17C6BD','#8B5CF6','#F59E0B','#EF4444','#3B82F6','#10B981','#EC4899','#6366F1'];

var SESSION_MAX_AGE = 30 * 24 * 60 * 60 * 1000; // 30 days in ms

var state = { quarter: currentQuarter(), year: new Date().getFullYear(), session: null, cache: {}, dealFilter: 'all', dealSort: { col: null, dir: 1 }, prevCalc: null };
function isMobile() { return window.innerWidth <= 480; }

function currentQuarter() { return Math.ceil((new Date().getMonth() + 1) / 3); }

function webhookUrl(id) { return API_BASE + '/telescope/webhook/' + id + '?await=true'; }

async function callWebhook(id, body, signal) {
  var opts = {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  };
  if (signal) opts.signal = signal;
  var resp = await fetch(webhookUrl(id), opts);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  var data = await resp.json();
  if (data.output && data.output.comment) {
    try { return JSON.parse(data.output.comment); } catch (e) { return data.output.comment; }
  }
  return data;
}

function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
function fmtDec(n) { return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtDate(s) { if (!s) return '\u2014'; var d = new Date(s); return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }
function fmtPct(n) { return (n * 100).toFixed(1) + '%'; }
function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showLoading(show) {
  document.getElementById('loading-skeleton').style.display = show ? 'block' : 'none';
  document.getElementById('dash-content').style.display = show ? 'none' : 'block';
  // Always show welcome + quarter controls, even during loading
}

/* ── Animated Counter ── */
function animateCounter(el, target, duration) {
  var start = 0;
  var startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var progress = Math.min((timestamp - startTime) / duration, 1);
    // ease-out cubic
    var eased = 1 - Math.pow(1 - progress, 3);
    var current = start + (target - start) * eased;
    el.textContent = fmtDec(current);
    if (progress < 1) {
      requestAnimationFrame(step);
    }
  }
  requestAnimationFrame(step);
}

/* ── Confetti ── */
function launchConfetti() {
  var canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  var colors = ['#17C6BD', '#FFD700', '#ffffff', '#8B5CF6', '#10B981'];
  var particles = [];
  for (var i = 0; i < 100; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * -1,
      w: Math.random() * 8 + 4,
      h: Math.random() * 4 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 2,
      rot: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.2
    });
  }
  var startTime = Date.now();
  function draw() {
    var elapsed = Date.now() - startTime;
    if (elapsed > 3000) {
      document.body.removeChild(canvas);
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var alpha = elapsed > 2500 ? 1 - (elapsed - 2500) / 500 : 1;
    ctx.globalAlpha = alpha;
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rv;
      p.vy += 0.05;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    requestAnimationFrame(draw);
  }
  draw();
}

/* ── Deal Card Color Border ── */
function dealBorderStyle(rate) {
  switch (rate) {
    case 'base': return 'border-left:3px solid var(--accent)';
    case 'accel': return 'border-left:3px solid var(--gold)';
    case 'split': return 'border-left:3px solid var(--accent)';
    case 'project': return 'border-left:3px solid var(--purple)';
    default: return '';
  }
}

/* ── Delta formatting ── */
function _mkDelta(diff, formatted) {
  if (diff === 0) return '';
  var cls = diff > 0 ? 'positive' : 'negative';
  var sign = diff > 0 ? '+' : '';
  return '<div class="delta ' + cls + '">' + sign + formatted + '</div>';
}
function fmtDelta(current, prev) {
  if (prev === null || prev === undefined) return '';
  return _mkDelta(current - prev, fmt(current - prev));
}
function fmtDeltaDec(current, prev) {
  if (prev === null || prev === undefined) return '';
  return _mkDelta(current - prev, fmtDec(current - prev));
}
function fmtDeltaNum(current, prev) {
  if (prev === null || prev === undefined) return '';
  var diff = current - prev;
  return _mkDelta(diff, '' + diff);
}
function fmtDeltaPct(current, prev) {
  if (prev === null || prev === undefined) return '';
  var diff = current - prev;
  return _mkDelta(diff, (diff * 100).toFixed(1) + '%');
}

/* ================================================================
   AUTH
   ================================================================ */
function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pw = document.getElementById('login-password').value;
  var errEl = document.getElementById('login-error');
  var btn = document.getElementById('login-btn');
  var remember = document.getElementById('remember-me').checked;

  if (!email || !pw) { errEl.textContent = 'Please enter email and password.'; return; }

  errEl.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  callWebhook(WF_AUTH, { email: email, password: pw })
    .then(function (res) {
      if (res && res.authenticated) {
        state.session = { cwRepId: res.cwRepId, cwRepName: res.cwRepName, email: email };
        if (remember) {
          state.session.loginAt = Date.now();
          localStorage.setItem('sw_session', JSON.stringify(state.session));
        } else {
          // Store session without loginAt so auto-login won't trigger
          localStorage.setItem('sw_session', JSON.stringify(state.session));
        }
        transitionToView('login-view', 'dashboard-view', function() {
          showDashboard();
        });
      } else {
        errEl.textContent = 'Invalid email or password.';
      }
    })
    .catch(function (err) {
      errEl.textContent = 'Login failed. Please try again.';
      console.error(err);
    })
    .finally(function () {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
}

function closeLogoutModal() { document.getElementById('logout-modal').classList.remove('show'); }

function doLogout() {
  closeLogoutModal();
  localStorage.removeItem('sw_session');
  state.session = null;
  state.cache = {};
  state.prevCalc = null;
  transitionToView('dashboard-view', 'login-view', function() {
    document.getElementById('login-view').style.display = 'flex';
    document.getElementById('dashboard-view').style.display = 'none';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
  });
}

/* ── Smooth View Transitions ── */
function transitionToView(fromId, toId, callback) {
  var fromEl = document.getElementById(fromId);
  var toEl = document.getElementById(toId);
  fromEl.style.opacity = '0';
  setTimeout(function() {
    fromEl.style.display = 'none';
    fromEl.style.opacity = '1';
    toEl.style.opacity = '0';
    if (toId === 'dashboard-view') {
      toEl.style.display = 'block';
    } else {
      toEl.style.display = 'flex';
    }
    if (callback) callback();
    // Force reflow
    void toEl.offsetWidth;
    toEl.style.opacity = '1';
  }, 200);
}

/* ================================================================
   DATA LOADING
   ================================================================ */
var _loadAbort = null;

async function loadQuarterData() {
  // Cancel any in-flight request
  if (_loadAbort) { _loadAbort.abort(); _loadAbort = null; }

  var key = state.quarter + '-' + state.year;
  if (state.cache[key]) {
    renderAll(state.cache[key]);
    loadPreviousQuarter();
    return;
  }

  showLoading(true);
  _loadAbort = new AbortController();
  var signal = _loadAbort.signal;
  try {
    var result = await callWebhook(WF_DATA, {
      cwRepId: state.session.cwRepId,
      quarter: state.quarter,
      year: state.year
    }, signal);
    _loadAbort = null;
    state.cache[key] = result;
    hideOfflineBanner();
    renderAll(result);
    loadPreviousQuarter();
  } catch (err) {
    if (err.name === 'AbortError') return; // Cancelled — new request will handle it
    _loadAbort = null;
    console.error('Failed to load data:', err);
    if (state.cache[key]) {
      renderAll(state.cache[key]);
      showOfflineBanner();
    } else {
      showOfflineBanner();
      document.getElementById('stats-row').innerHTML = '<div class="stat-card" style="grid-column:1/-1;text-align:center;color:var(--red)">Failed to load data. Please try again.</div>';
    }
  } finally {
    if (!signal.aborted) showLoading(false);
  }
}

/* ── Load Previous Quarter (background, non-blocking) ── */
function loadPreviousQuarter() {
  var prevQ = state.quarter - 1;
  var prevY = state.year;
  if (prevQ < 1) { prevQ = 4; prevY = state.year - 1; }
  var prevKey = prevQ + '-' + prevY;

  if (state.cache[prevKey]) {
    var prevOpps = (state.cache[prevKey] && state.cache[prevKey].opportunities) ? state.cache[prevKey].opportunities : [];
    state.prevCalc = calculateCommissions(prevOpps);
    updateDeltas();
    return;
  }

  // Fetch in background
  callWebhook(WF_DATA, {
    cwRepId: state.session.cwRepId,
    quarter: prevQ,
    year: prevY
  }).then(function(result) {
    state.cache[prevKey] = result;
    var prevOpps = (result && result.opportunities) ? result.opportunities : [];
    state.prevCalc = calculateCommissions(prevOpps);
    updateDeltas();
  }).catch(function() {
    // Silently fail — deltas just won't show
  });
}

/* ── Update deltas on stat cards and hero card after prev quarter loads ── */
function updateDeltas() {
  if (!state.prevCalc || !state._calc) return;
  var calc = state._calc;
  var prev = state.prevCalc;
  var totalRev = calc.totalMrr + calc.totalProject;
  var prevTotalRev = prev.totalMrr + prev.totalProject;

  // Update stat card deltas
  var quotaPct = calc.totalMrr / QUOTA;
  var prevQuotaPct = prev.totalMrr / QUOTA;
  var deltaMap = {
    'Revenue Closed': fmtDelta(totalRev, prevTotalRev),
    'MRR Revenue': fmtDelta(calc.totalMrr, prev.totalMrr),
    'Project Revenue': fmtDelta(calc.totalProject, prev.totalProject),
    'Commission Earned': fmtDeltaDec(calc.totalCommission, prev.totalCommission),
    'Deals Won': fmtDeltaNum(calc.deals.length, prev.deals.length),
    'Quota Attainment': fmtDeltaPct(quotaPct, prevQuotaPct)
  };

  var statCards = document.querySelectorAll('.stat-card');
  for (var i = 0; i < statCards.length; i++) {
    var labelEl = statCards[i].querySelector('.label');
    if (labelEl && deltaMap[labelEl.textContent]) {
      // Remove existing delta
      var existing = statCards[i].querySelector('.delta');
      if (existing) existing.remove();
      statCards[i].insertAdjacentHTML('beforeend', deltaMap[labelEl.textContent]);
    }
  }

  // Update hero delta on mobile
  if (isMobile()) {
    var heroDelta = document.getElementById('hero-delta');
    if (heroDelta) {
      var diff = calc.totalCommission - prev.totalCommission;
      if (diff !== 0) {
        var cls = diff > 0 ? 'positive' : 'negative';
        var sign = diff > 0 ? '+' : '';
        heroDelta.className = 'hero-delta ' + cls;
        heroDelta.textContent = sign + fmtDec(diff) + ' vs last quarter';
      }
    }
  }
}

/* ================================================================
   COMMISSION CALCULATION
   ================================================================ */
function calculateCommissions(opps) {
  if (!opps || !opps.length) return { deals: [], totalMrr: 0, totalProject: 0, totalCommission: 0, mrrDeals: [], projectDeals: [], runningMrr: 0 };

  var deals = opps.map(function (o) {
    var mrr = (o.recurringTotal && o.recurringTotal > 0) ? o.recurringTotal : o.amount;
    return {
      name: o.name || o.opportunityName || 'Untitled',
      company: (o.company && o.company.name) ? o.company.name : (o.companyName || ''),
      closedDate: o.closedDate || o.closeDate || null,
      _mrr: mrr,
      amount: o.amount || 0,
      type: (o.recurringTotal && o.recurringTotal > 0) ? 'mrr' : 'project',
      rate: null,
      commission: 0,
      basePortion: 0,
      accelPortion: 0
    };
  });

  var mrrDeals = deals.filter(function (d) { return d.type === 'mrr'; });
  var projectDeals = deals.filter(function (d) { return d.type === 'project'; });

  // Sort MRR deals by closed date
  mrrDeals.sort(function (a, b) {
    if (!a.closedDate && !b.closedDate) return 0;
    if (!a.closedDate) return 1;
    if (!b.closedDate) return -1;
    return new Date(a.closedDate) - new Date(b.closedDate);
  });

  var runningMrr = 0;
  for (var i = 0; i < mrrDeals.length; i++) {
    var deal = mrrDeals[i];
    var mrr = deal._mrr;

    if (runningMrr >= QUOTA) {
      deal.rate = 'accel';
      deal.commission = mrr * ACCEL_RATE;
      deal.accelPortion = mrr;
    } else if (runningMrr + mrr <= QUOTA) {
      deal.rate = 'base';
      deal.commission = mrr * BASE_RATE;
      deal.basePortion = mrr;
    } else {
      deal.rate = 'split';
      deal.basePortion = QUOTA - runningMrr;
      deal.accelPortion = mrr - deal.basePortion;
      deal.commission = deal.basePortion * BASE_RATE + deal.accelPortion * ACCEL_RATE;
    }
    deal.runningTotal = runningMrr + mrr;
    runningMrr += mrr;
  }

  // Project deals
  for (var j = 0; j < projectDeals.length; j++) {
    projectDeals[j].rate = 'project';
    projectDeals[j].commission = 0;
    projectDeals[j].runningTotal = 0;
  }

  var allDeals = mrrDeals.concat(projectDeals);
  var totalMrr = mrrDeals.reduce(function (s, d) { return s + d._mrr; }, 0);
  var totalProject = projectDeals.reduce(function (s, d) { return s + d._mrr; }, 0);
  var totalCommission = mrrDeals.reduce(function (s, d) { return s + d.commission; }, 0);

  return {
    deals: allDeals,
    mrrDeals: mrrDeals,
    projectDeals: projectDeals,
    totalMrr: totalMrr,
    totalProject: totalProject,
    totalCommission: totalCommission,
    runningMrr: runningMrr
  };
}

/* ================================================================
   RENDER ALL
   ================================================================ */
function renderAll(data) {
  var opps = (data && data.opportunities) ? data.opportunities : [];
  var calc = calculateCommissions(opps);
  state._calc = calc;
  state._data = data;

  renderStats(calc);
  renderWaterfall(calc);
  renderCommissionTable(calc);
  state.dealFilter = 'all';
  state.dealSort = { col: null, dir: 1 };
  renderDealFilterTabs();
  renderDealTable(calc);
  renderCompanyBreakdown(calc);

  // Mobile: collapsible sections + hide waterfall
  if (isMobile()) {
    document.getElementById('waterfall-section').style.display = 'none';
    setupCollapsible('commission-table-section', false);
    setupCollapsible('company-section', true);
  } else {
    document.getElementById('waterfall-section').style.display = '';
  }

  // Confetti if quota exceeded
  var quotaPct = calc.totalMrr / QUOTA;
  if (quotaPct > 1) {
    setTimeout(launchConfetti, 300);
  }
}

function setupCollapsible(sectionId, startCollapsed) {
  var section = document.getElementById(sectionId);
  if (!section) return;
  var title = section.querySelector('.section-title');
  var body = title.nextElementSibling;
  // Wrap remaining content if not already wrapped
  if (!section.querySelector('.section-body')) {
    var wrapper = document.createElement('div');
    wrapper.className = 'section-body' + (startCollapsed ? ' collapsed' : '');
    while (title.nextSibling) wrapper.appendChild(title.nextSibling);
    section.appendChild(wrapper);
    body = wrapper;
  }
  title.className = 'section-title collapsible' + (startCollapsed ? ' collapsed' : '');
  title.onclick = function() {
    title.classList.toggle('collapsed');
    body.classList.toggle('collapsed');
  };
}

/* ================================================================
   STATS ROW
   ================================================================ */
function renderStats(calc) {
  var totalRev = calc.totalMrr + calc.totalProject;
  var quotaPct = calc.totalMrr / QUOTA;
  var effectiveRate = calc.totalMrr > 0 ? (calc.totalCommission / calc.totalMrr) : 0;
  var mobile = isMobile();

  // Hero card (mobile only)
  if (mobile) {
    var barPct = Math.min(quotaPct * 100, 100);
    var isGold = quotaPct > 1;
    var heroHtml = '<div class="hero-card">';
    heroHtml += '<div class="hero-label">Commission Earned</div>';
    heroHtml += '<div class="hero-value" id="hero-commission-value">$0.00</div>';
    heroHtml += '<div class="hero-delta" id="hero-delta"></div>';
    heroHtml += '<div class="hero-bar"><div class="hero-bar-fill' + (isGold ? ' gold-bar' : '') + '" style="width:' + barPct.toFixed(0) + '%"></div></div>';
    heroHtml += '<div class="hero-sub">' + fmtPct(quotaPct) + ' of ' + fmt(QUOTA) + ' quota &middot; ' + calc.deals.length + ' deals</div>';
    heroHtml += '</div>';
    document.getElementById('hero-card-wrap').innerHTML = heroHtml;

    // Animate the commission counter
    var heroValueEl = document.getElementById('hero-commission-value');
    if (heroValueEl && calc.totalCommission > 0) {
      animateCounter(heroValueEl, calc.totalCommission, 1000);
    } else if (heroValueEl) {
      heroValueEl.textContent = fmtDec(0);
    }
  } else {
    document.getElementById('hero-card-wrap').innerHTML = '';
  }

  var cards = [
    { label: 'Revenue Closed', value: fmt(totalRev), cls: '', mobileHide: true },
    { label: 'MRR Revenue', value: fmt(calc.totalMrr), cls: 'accent', mobileHide: false },
    { label: 'Project Revenue', value: fmt(calc.totalProject), cls: '', mobileHide: true },
    { label: 'Commission Earned', value: fmtDec(calc.totalCommission), cls: 'accent', mobileHide: true },
    { label: 'Deals Won', value: calc.deals.length, cls: '', mobileHide: false },
    { label: 'Quota Attainment', value: fmtPct(quotaPct), cls: quotaPct >= 1 ? 'gold' : '', mobileHide: false, fullWidth: true },
    { label: 'Effective Rate', value: fmtPct(effectiveRate), cls: '', mobileHide: true }
  ];

  var html = '';
  for (var i = 0; i < cards.length; i++) {
    var hideClass = (mobile && cards[i].mobileHide) ? ' mobile-hide' : '';
    var fullStyle = (mobile && cards[i].fullWidth) ? ' style="grid-column:1/-1"' : '';
    html += '<div class="stat-card' + hideClass + '"' + fullStyle + '><div class="label">' + cards[i].label + '</div><div class="value ' + cards[i].cls + '">' + cards[i].value + '</div></div>';
  }
  document.getElementById('stats-row').innerHTML = html;

  // Apply deltas if prev data already loaded
  if (state.prevCalc) {
    updateDeltas();
  }
}

/* ================================================================
   WATERFALL CHART
   ================================================================ */
function renderWaterfall(calc) {
  var container = document.getElementById('waterfall-chart');
  if (!calc.mrrDeals.length && !calc.projectDeals.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:32px">No deals for this quarter</div>';
    return;
  }

  var maxVal = Math.max(calc.runningMrr, QUOTA) * 1.15;
  if (maxVal === 0) maxVal = QUOTA * 1.15;

  var html = '';

  // Quota line position
  var quotaPct = (QUOTA / maxVal) * 100;

  for (var i = 0; i < calc.mrrDeals.length; i++) {
    var deal = calc.mrrDeals[i];
    var barStart = ((deal.runningTotal - deal._mrr) / maxVal) * 100;
    var barWidth = (deal._mrr / maxVal) * 100;

    var barHtml = '';
    if (deal.rate === 'base') {
      barHtml = '<div class="wf-bar-base" style="width:100%"></div>';
    } else if (deal.rate === 'accel') {
      barHtml = '<div class="wf-bar-accel" style="width:100%"></div>';
    } else {
      var baseFrac = (deal.basePortion / deal._mrr) * 100;
      barHtml = '<div class="wf-bar-base" style="width:' + baseFrac + '%"></div><div class="wf-bar-accel" style="width:' + (100 - baseFrac) + '%"></div>';
    }

    html += '<div class="wf-row">';
    html += '<div class="wf-label" title="' + escHtml(deal.name) + '">' + escHtml(deal.name) + '</div>';
    html += '<div class="wf-bar-wrap" style="position:relative">';
    if (i === 0) {
      html += '<div class="wf-quota-line" style="left:' + quotaPct + '%"><span class="wf-quota-label">Quota ' + fmt(QUOTA) + '</span></div>';
    } else {
      html += '<div class="wf-quota-line" style="left:' + quotaPct + '%"></div>';
    }
    html += '<div class="wf-bar" style="margin-left:' + barStart + '%;width:' + barWidth + '%">' + barHtml + '</div>';
    html += '<div class="wf-amount" style="left:' + (barStart + barWidth) + '%;right:auto;transform:translateY(-50%) translateX(4px)">' + fmt(deal._mrr) + '</div>';
    html += '</div></div>';
  }

  // Project bar
  if (calc.projectDeals.length > 0) {
    var projTotal = calc.totalProject;
    var projWidth = (projTotal / maxVal) * 100;
    html += '<div class="wf-row" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">';
    html += '<div class="wf-label" style="color:var(--purple)">Projects</div>';
    html += '<div class="wf-bar-wrap">';
    html += '<div class="wf-bar" style="width:' + projWidth + '%"><div class="wf-bar-project" style="width:100%"></div></div>';
    html += '<div class="wf-amount">' + fmt(projTotal) + '</div>';
    html += '</div></div>';
  }

  container.innerHTML = html;
}

/* ================================================================
   COMMISSION BREAKDOWN TABLE
   ================================================================ */
function renderCommissionTable(calc) {
  if (!calc.mrrDeals.length) {
    document.getElementById('commission-table-wrap').innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:24px">No MRR deals</div>';
    return;
  }

  if (isMobile()) {
    var html = '';
    for (var i = 0; i < calc.mrrDeals.length; i++) {
      var d = calc.mrrDeals[i];
      var border = dealBorderStyle(d.rate);
      html += '<div class="deal-card" style="' + border + '">';
      html += '<div class="dc-name">' + (i + 1) + '. ' + escHtml(d.name) + '</div>';
      html += '<div class="dc-row"><span class="dc-label">Monthly</span><span class="dc-value">' + fmt(d._mrr) + '</span></div>';
      html += '<div class="dc-row"><span class="dc-label">Running Total</span><span class="dc-value">' + fmt(d.runningTotal) + '</span></div>';
      html += '<div class="dc-row"><span class="dc-label">Rate</span><span class="dc-value">' + rateLabel(d.rate) + '</span></div>';
      html += '<div class="dc-row"><span class="dc-label">Commission</span><span class="dc-value accent">' + fmtDec(d.commission) + '</span></div>';
      if (d.rate === 'split') {
        html += '<div class="dc-split">';
        html += '<div class="dc-row"><span class="dc-label">Base portion</span><span class="dc-value">' + fmt(d.basePortion) + ' @ 1.0x = ' + fmtDec(d.basePortion * BASE_RATE) + '</span></div>';
        html += '<div class="dc-row"><span class="dc-label">Accelerator</span><span class="dc-value gold">' + fmt(d.accelPortion) + ' @ 1.5x = ' + fmtDec(d.accelPortion * ACCEL_RATE) + '</span></div>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '<div class="deal-card-total"><div class="dc-row"><span class="dc-label" style="font-weight:600;color:#fff">Subtotal</span></div><div class="dc-row"><span class="dc-label">MRR Total</span><span class="dc-value">' + fmt(calc.totalMrr) + '</span></div><div class="dc-row"><span class="dc-label">Commission</span><span class="dc-value accent" style="font-size:16px;font-weight:700">' + fmtDec(calc.totalCommission) + '</span></div></div>';
    document.getElementById('commission-table-wrap').innerHTML = html;
    return;
  }

  var html = '<table><thead><tr><th>#</th><th>Deal</th><th>Monthly</th><th>Running Total</th><th>Rate</th><th>Commission</th></tr></thead><tbody>';

  for (var i = 0; i < calc.mrrDeals.length; i++) {
    var d = calc.mrrDeals[i];
    var rateBadge = rateLabel(d.rate);

    html += '<tr><td>' + (i + 1) + '</td>';
    html += '<td>' + escHtml(d.name) + '</td>';
    html += '<td>' + fmt(d._mrr) + '</td>';
    html += '<td>' + fmt(d.runningTotal) + '</td>';
    html += '<td>' + rateBadge + '</td>';
    html += '<td>' + fmtDec(d.commission) + '</td></tr>';

    if (d.rate === 'split') {
      html += '<tr class="sub-row"><td></td><td>Base portion</td><td>' + fmt(d.basePortion) + '</td><td></td><td><span class="rate-badge rate-base">1.0x</span></td><td>' + fmtDec(d.basePortion * BASE_RATE) + '</td></tr>';
      html += '<tr class="sub-row"><td></td><td>Accelerator portion</td><td>' + fmt(d.accelPortion) + '</td><td></td><td><span class="rate-badge rate-accel">1.5x</span></td><td>' + fmtDec(d.accelPortion * ACCEL_RATE) + '</td></tr>';
    }
  }

  html += '<tr class="total-row"><td></td><td>Subtotal</td><td>' + fmt(calc.totalMrr) + '</td><td></td><td></td><td>' + fmtDec(calc.totalCommission) + '</td></tr>';
  html += '</tbody></table>';

  document.getElementById('commission-table-wrap').innerHTML = html;
}

function rateLabel(rate) {
  switch (rate) {
    case 'base': return '<span class="rate-badge rate-base">1.0x Base</span>';
    case 'accel': return '<span class="rate-badge rate-accel">1.5x Accel</span>';
    case 'split': return '<span class="rate-badge rate-split">Split</span>';
    case 'project': return '<span class="rate-badge rate-project">Project</span>';
    default: return '';
  }
}

/* ================================================================
   DEAL TABLE WITH FILTERS & SORTING
   ================================================================ */
function renderDealFilterTabs() {
  var tabs = [
    { key: 'all', label: 'All' },
    { key: 'mrr', label: 'MRR' },
    { key: 'project', label: 'Project' }
  ];
  var html = '';
  for (var i = 0; i < tabs.length; i++) {
    html += '<button onclick="setDealFilter(\'' + tabs[i].key + '\')" class="' + (state.dealFilter === tabs[i].key ? 'active' : '') + '">' + tabs[i].label + '</button>';
  }
  document.getElementById('deal-filter-tabs').innerHTML = html;
}

function setDealFilter(f) {
  state.dealFilter = f;
  renderDealFilterTabs();
  renderDealTable(state._calc);
}

function sortDeals(col) {
  if (state.dealSort.col === col) {
    state.dealSort.dir *= -1;
  } else {
    state.dealSort.col = col;
    state.dealSort.dir = 1;
  }
  renderDealTable(state._calc);
}

function toggleDealCard(el) {
  el.classList.toggle('expanded');
}

function renderDealTable(calc) {
  var deals = calc.deals.slice();

  // Filter
  if (state.dealFilter === 'mrr') deals = deals.filter(function (d) { return d.type === 'mrr'; });
  else if (state.dealFilter === 'project') deals = deals.filter(function (d) { return d.type === 'project'; });

  // Sort
  var sc = state.dealSort.col;
  var sd = state.dealSort.dir;
  if (sc) {
    deals.sort(function (a, b) {
      var av, bv;
      switch (sc) {
        case 'name': av = (a.name || '').toLowerCase(); bv = (b.name || '').toLowerCase(); break;
        case 'company': av = (a.company || '').toLowerCase(); bv = (b.company || '').toLowerCase(); break;
        case 'closedDate': av = a.closedDate ? new Date(a.closedDate).getTime() : 0; bv = b.closedDate ? new Date(b.closedDate).getTime() : 0; break;
        case 'monthly': av = a._mrr; bv = b._mrr; break;
        case 'contract': av = a.amount; bv = b.amount; break;
        case 'rate': av = a.rate || ''; bv = b.rate || ''; break;
        case 'commission': av = a.commission; bv = b.commission; break;
        default: return 0;
      }
      if (av < bv) return -1 * sd;
      if (av > bv) return 1 * sd;
      return 0;
    });
  }

  var cols = [
    { key: 'name', label: 'Deal Name' },
    { key: 'company', label: 'Company' },
    { key: 'closedDate', label: 'Closed Date' },
    { key: 'monthly', label: 'Monthly' },
    { key: 'contract', label: 'Contract' },
    { key: 'rate', label: 'Rate' },
    { key: 'commission', label: 'Commission' }
  ];

  var html = '<table><thead><tr>';
  for (var c = 0; c < cols.length; c++) {
    var sortCls = '';
    if (state.dealSort.col === cols[c].key) sortCls = sd === 1 ? ' sorted-asc' : ' sorted-desc';
    html += '<th class="' + sortCls + '" onclick="sortDeals(\'' + cols[c].key + '\')">' + cols[c].label + '</th>';
  }
  html += '</tr></thead><tbody>';

  if (isMobile()) {
    var mhtml = '';
    if (!deals.length) {
      mhtml = '<div style="text-align:center;color:var(--text-dim);padding:24px">No deals</div>';
    } else {
      for (var i = 0; i < deals.length; i++) {
        var d = deals[i];
        var border = dealBorderStyle(d.rate);
        mhtml += '<div class="deal-card expanded" style="' + border + '" onclick="toggleDealCard(this)">';
        // Collapsed header: name + rate badge + commission
        mhtml += '<div class="dc-header">';
        mhtml += '<div class="dc-header-left"><div class="dc-name" style="margin-bottom:0">' + escHtml(d.name) + '</div></div>';
        mhtml += '<div class="dc-header-right">' + rateLabel(d.rate) + '<span style="font-size:12px;font-weight:600;color:var(--accent)">' + (d.commission > 0 ? fmtDec(d.commission) : '\u2014') + '</span></div>';
        mhtml += '</div>';
        // Expandable body
        mhtml += '<div class="dc-expand-body">';
        if (d.company) mhtml += '<div class="dc-row" style="margin-top:8px"><span class="dc-label">Company</span><span class="dc-value">' + escHtml(d.company) + '</span></div>';
        mhtml += '<div class="dc-row"><span class="dc-label">Closed</span><span class="dc-value">' + fmtDate(d.closedDate) + '</span></div>';
        mhtml += '<div class="dc-row"><span class="dc-label">Monthly</span><span class="dc-value">' + fmt(d._mrr) + '</span></div>';
        mhtml += '<div class="dc-row"><span class="dc-label">Contract</span><span class="dc-value">' + fmt(d.amount) + '</span></div>';
        mhtml += '</div>';
        mhtml += '</div>';
      }
    }
    document.getElementById('deal-table-wrap').innerHTML = mhtml;
    return;
  }

  if (!deals.length) {
    html += '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:24px">No deals</td></tr>';
  } else {
    for (var i = 0; i < deals.length; i++) {
      var d = deals[i];
      html += '<tr>';
      html += '<td>' + escHtml(d.name) + '</td>';
      html += '<td>' + escHtml(d.company) + '</td>';
      html += '<td>' + fmtDate(d.closedDate) + '</td>';
      html += '<td>' + fmt(d._mrr) + '</td>';
      html += '<td>' + fmt(d.amount) + '</td>';
      html += '<td>' + rateLabel(d.rate) + '</td>';
      html += '<td>' + (d.commission > 0 ? fmtDec(d.commission) : '\u2014') + '</td>';
      html += '</tr>';
    }
  }

  html += '</tbody></table>';
  document.getElementById('deal-table-wrap').innerHTML = html;
}

/* ================================================================
   COMPANY BREAKDOWN
   ================================================================ */
function renderCompanyBreakdown(calc) {
  var companies = {};
  for (var i = 0; i < calc.deals.length; i++) {
    var d = calc.deals[i];
    var co = d.company || 'Unknown';
    if (!companies[co]) companies[co] = { name: co, total: 0, mrr: 0, project: 0, deals: 0 };
    companies[co].total += d._mrr;
    if (d.type === 'mrr') companies[co].mrr += d._mrr;
    else companies[co].project += d._mrr;
    companies[co].deals++;
  }

  var coList = Object.keys(companies).map(function (k) { return companies[k]; });
  coList.sort(function (a, b) { return b.total - a.total; });

  if (!coList.length) {
    document.getElementById('company-chart').innerHTML = '';
    document.getElementById('company-table-wrap').innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:24px">No data</div>';
    return;
  }

  var maxTotal = coList[0].total || 1;

  // Chart
  var chartHtml = '';
  for (var j = 0; j < coList.length; j++) {
    var c = coList[j];
    var barPct = (c.total / maxTotal) * 100;
    var mrrPct = c.total > 0 ? (c.mrr / c.total) * 100 : 0;
    var projPct = 100 - mrrPct;
    var color = COMPANY_COLORS[j % COMPANY_COLORS.length];
    var projColor = adjustAlpha(color, 0.5);

    chartHtml += '<div class="cb-row">';
    chartHtml += '<div class="cb-label" title="' + escHtml(c.name) + '">' + escHtml(c.name) + '</div>';
    chartHtml += '<div class="cb-bar-bg" style="width:' + barPct + '%">';
    if (c.mrr > 0) chartHtml += '<div class="cb-bar-seg" style="width:' + mrrPct + '%;background:' + color + '"></div>';
    if (c.project > 0) chartHtml += '<div class="cb-bar-seg" style="width:' + projPct + '%;background:' + projColor + '"></div>';
    chartHtml += '</div>';
    chartHtml += '<div class="cb-amount">' + fmt(c.total) + '</div>';
    chartHtml += '</div>';
  }
  document.getElementById('company-chart').innerHTML = chartHtml;

  // Table / Cards
  if (isMobile()) {
    var tHtml = '';
    for (var k = 0; k < coList.length; k++) {
      var cc = coList[k];
      tHtml += '<div class="deal-card">';
      tHtml += '<div class="dc-name">' + escHtml(cc.name) + '</div>';
      tHtml += '<div class="dc-row"><span class="dc-label">Total</span><span class="dc-value">' + fmt(cc.total) + '</span></div>';
      tHtml += '<div class="dc-row"><span class="dc-label">MRR</span><span class="dc-value accent">' + fmt(cc.mrr) + '</span></div>';
      tHtml += '<div class="dc-row"><span class="dc-label">Project</span><span class="dc-value">' + fmt(cc.project) + '</span></div>';
      tHtml += '<div class="dc-row"><span class="dc-label">Deals</span><span class="dc-value">' + cc.deals + '</span></div>';
      tHtml += '</div>';
    }
    document.getElementById('company-table-wrap').innerHTML = tHtml;
  } else {
    var tHtml = '<table><thead><tr><th>Company</th><th>Total</th><th>MRR</th><th>Project</th><th>Deals</th></tr></thead><tbody>';
    for (var k = 0; k < coList.length; k++) {
      var cc = coList[k];
      tHtml += '<tr><td>' + escHtml(cc.name) + '</td><td>' + fmt(cc.total) + '</td><td>' + fmt(cc.mrr) + '</td><td>' + fmt(cc.project) + '</td><td>' + cc.deals + '</td></tr>';
    }
    tHtml += '</tbody></table>';
    document.getElementById('company-table-wrap').innerHTML = tHtml;
  }
}

function adjustAlpha(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

/* ================================================================
   PULL TO REFRESH (mobile only)
   ================================================================ */
(function setupPullToRefresh() {
  var dashBody = document.getElementById('dash-body');
  var indicator = document.getElementById('ptr-indicator');
  var startY = 0;
  var pulling = false;
  var threshold = 60;

  dashBody.addEventListener('touchstart', function(e) {
    if (!isMobile() || dashBody.scrollTop > 0) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });

  dashBody.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 10 && dashBody.scrollTop <= 0) {
      var progress = Math.min(dy / threshold, 1);
      indicator.style.display = 'flex';
      indicator.style.opacity = progress;
      indicator.style.transform = 'scale(' + (0.5 + progress * 0.5) + ')';
    }
  }, { passive: true });

  dashBody.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    var dy = (e.changedTouches[0] ? e.changedTouches[0].clientY : 0) - startY;
    if (dy >= threshold && dashBody.scrollTop <= 0) {
      indicator.classList.add('show');
      // Clear cache for current quarter and reload
      var key = state.quarter + '-' + state.year;
      delete state.cache[key];
      state.prevCalc = null;
      loadQuarterData().then(function() {
        indicator.classList.remove('show');
        indicator.style.display = 'none';
        indicator.style.opacity = '';
        indicator.style.transform = '';
      });
    } else {
      indicator.style.display = 'none';
      indicator.style.opacity = '';
      indicator.style.transform = '';
    }
  }, { passive: true });
})();

/* ================================================================
   ENTER KEY SUPPORT
   ================================================================ */
document.getElementById('login-email').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-password').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });

/* ================================================================
   BOOT
   ================================================================ */
(function boot() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function (err) {
      console.warn('SW registration failed:', err);
    });
  }

  // Check existing session with auto-login (remember me)
  try {
    var saved = localStorage.getItem('sw_session');
    if (saved) {
      var session = JSON.parse(saved);
      if (session && session.cwRepId) {
        // Check if session has loginAt and is within 30 days
        if (session.loginAt && (Date.now() - session.loginAt) < SESSION_MAX_AGE) {
          state.session = session;
          document.getElementById('login-view').style.display = 'none';
          showDashboard();
          return;
        } else if (session.loginAt && (Date.now() - session.loginAt) >= SESSION_MAX_AGE) {
          // Expired — clear and show login
          localStorage.removeItem('sw_session');
        } else {
          // Legacy session without loginAt — still allow (backward compat)
          state.session = session;
          document.getElementById('login-view').style.display = 'none';
          showDashboard();
          return;
        }
      }
    }
  } catch (e) { /* ignore */ }

  // Show login
  document.getElementById('login-view').style.display = 'flex';
})();
</script>

<!-- ── INSTALL BANNER ── -->
<div id="install-banner">
  <img class="ib-icon" src="icons/icon-192x192.png" alt="">
  <div class="ib-text">
    <div class="ib-title">Install StrikeWorks Commissions</div>
    <div class="ib-sub">Add to your home screen for quick access</div>
  </div>
  <button class="ib-install" id="install-btn">Install</button>
  <button class="ib-dismiss" id="install-dismiss">&times;</button>
</div>

<script>
(function() {
  var deferredPrompt = null;
  var banner = document.getElementById('install-banner');
  var installBtn = document.getElementById('install-btn');
  var dismissBtn = document.getElementById('install-dismiss');

  // Skip if already installed as standalone
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) return;

  // Skip if user previously dismissed
  if (localStorage.getItem('sw-install-dismissed')) return;

  // Android/Desktop: beforeinstallprompt
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.add('show');
  });

  // iOS: show manual instructions
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS && !window.navigator.standalone) {
    document.querySelector('#install-banner .ib-sub').textContent = 'Tap Share then "Add to Home Screen"';
    installBtn.style.display = 'none';
    banner.classList.add('show');
  }

  installBtn.addEventListener('click', function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(result) {
      if (result.outcome === 'accepted') {
        banner.classList.remove('show');
      }
      deferredPrompt = null;
    });
  });

  dismissBtn.addEventListener('click', function() {
    banner.classList.remove('show');
    localStorage.setItem('sw-install-dismissed', '1');
  });

  // Hide if app gets installed
  window.addEventListener('appinstalled', function() {
    banner.classList.remove('show');
  });
})();
</script>
